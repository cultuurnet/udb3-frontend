# Reference and local development only; superseded by Puppet-generated compose
services:
  frontend:
    image: 757200591793.dkr.ecr.eu-west-1.amazonaws.com/uitdatabank/frontend:latest
    network_mode: host
    restart: unless-stopped
    env_file:
      - /etc/uitdatabank-frontend/env
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:3000/ || exit 1']
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3
