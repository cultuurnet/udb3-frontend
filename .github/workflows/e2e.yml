name: E2E

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  test-e2e:
    if: github.event.pull_request.draft == false

    timeout-minutes: 30

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Build Next.js application
        env:
          NEXT_PUBLIC_ENVIRONMENT: ${{ secrets.NEXT_PUBLIC_ENVIRONMENT }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.NEXT_PUBLIC_API_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_LEGACY_APP_URL: ${{ secrets.NEXT_PUBLIC_LEGACY_APP_URL }}
          NEXT_PUBLIC_AUTH_URL: ${{ secrets.NEXT_PUBLIC_AUTH_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          NEXT_PUBLIC_NEW_ANNOUNCEMENTS_URL: ${{ secrets.NEXT_PUBLIC_NEW_ANNOUNCEMENTS_URL }}
          NEXT_PUBLIC_NEWSLETTER_EMAIL_LIST_ID: ${{ secrets.NEXT_PUBLIC_NEWSLETTER_EMAIL_LIST_ID }}
          NEXT_PUBLIC_TAXONOMY_URL: ${{ secrets.NEXT_PUBLIC_TAXONOMY_URL }}
          NEXT_PUBLIC_CULTUURKUUR_LOCATION_ID: ${{ secrets.NEXT_PUBLIC_CULTUURKUUR_LOCATION_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_UIV_URL: ${{ secrets.NEXT_PUBLIC_UIV_URL }}
          NEXT_PUBLIC_CK_URL: ${{ secrets.NEXT_PUBLIC_CK_URL }}
          NEXT_PUBLIC_UDB_PUBLICATION_RULES_URL: ${{ secrets.NEXT_PUBLIC_UDB_PUBLICATION_RULES_URL }}
        run: yarn build

      - name: Run Playwright tests
        env:
          NEXT_PUBLIC_ENVIRONMENT: ${{ secrets.NEXT_PUBLIC_ENVIRONMENT }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.NEXT_PUBLIC_API_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_LEGACY_APP_URL: ${{ secrets.NEXT_PUBLIC_LEGACY_APP_URL }}
          NEXT_PUBLIC_AUTH_URL: ${{ secrets.NEXT_PUBLIC_AUTH_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          NEXT_PUBLIC_NEW_ANNOUNCEMENTS_URL: ${{ secrets.NEXT_PUBLIC_NEW_ANNOUNCEMENTS_URL }}
          NEXT_PUBLIC_NEWSLETTER_EMAIL_LIST_ID: ${{ secrets.NEXT_PUBLIC_NEWSLETTER_EMAIL_LIST_ID }}
          NEXT_PUBLIC_TAXONOMY_URL: ${{ secrets.NEXT_PUBLIC_TAXONOMY_URL }}
          NEXT_PUBLIC_CULTUURKUUR_LOCATION_ID: ${{ secrets.NEXT_PUBLIC_CULTUURKUUR_LOCATION_ID }}
          NEXT_PUBLIC_UIV_URL: ${{ secrets.NEXT_PUBLIC_UIV_URL }}
          NEXT_PUBLIC_CK_URL: ${{ secrets.NEXT_PUBLIC_CK_URL }}
          NEXT_PUBLIC_UDB_PUBLICATION_RULES_URL: ${{ secrets.NEXT_PUBLIC_UDB_PUBLICATION_RULES_URL }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_ADMIN_EMAIL: ${{ secrets.E2E_TEST_ADMIN_EMAIL }}
          E2E_TEST_ADMIN_PASSWORD: ${{ secrets.E2E_TEST_ADMIN_PASSWORD }}
          E2E_TEST_ADMIN_ID: ${{ secrets.E2E_TEST_ADMIN_ID }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          AUTH_ISSUER_BASE_URL: ${{ secrets.AUTH_ISSUER_BASE_URL }}
          AUTH_CLIENT_ID: ${{ secrets.AUTH_CLIENT_ID }}
          AUTH_CLIENT_SECRET: ${{ secrets.AUTH_CLIENT_SECRET }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npx playwright test

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces, videos and screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Print debug instructions on failure
        if: failure()
        run: |
          {
            echo "## Playwright failure — how to debug"
            echo ""
            echo "Download these artifacts from this workflow run:"
            echo ""
            echo "- **playwright-report** — open \`index.html\` locally (\`npx playwright show-report path/to/playwright-report\`)"
            echo "- **playwright-traces** — per-test \`trace.zip\`, video, and screenshots for every failing attempt"
            echo ""
            echo "Open a trace with:"
            echo '```'
            echo "npx playwright show-trace path/to/test-results/<test-name>/trace.zip"
            echo '```'
            echo ""
            echo "Reproduce the CI conditions locally:"
            echo '```'
            echo "CI=true yarn test:e2e --grep \"<test name pattern>\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
